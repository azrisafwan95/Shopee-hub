<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shopee Hub - Pro Katalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .shopee-gradient { background: linear-gradient(135deg, #f53d2d 0%, #ff6433 100%); }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-hidden { transform: translateX(-100%); }
        .sidebar-visible { transform: translateX(0); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .snap-x { scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .snap-center { scroll-snap-align: center; }
    </style>
</head>
<body>

<div id="app" class="max-w-lg mx-auto min-h-screen pb-24 shadow-2xl bg-white relative overflow-hidden">
  
  <!-- Sidebar Menu -->
  <div id="sidebar-overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[100]"></div>
  <div id="sidebar" class="sidebar-hidden fixed top-0 left-0 bottom-0 w-64 bg-white z-[101] shadow-2xl p-6 text-left">
    <h2 class="font-black text-xl text-orange-600 mb-8 italic">KATEGORI</h2>
    <div id="category-list" class="flex flex-col gap-3"></div>
  </div>

  <!-- Header -->
  <header class="bg-white sticky top-0 z-50 px-5 py-4 border-b border-gray-100 shadow-sm text-center">
    <div class="flex justify-between items-center mb-4">
      <button onclick="toggleSidebar()" class="text-gray-700">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
      </button>
      <h1 class="text-xl font-black text-orange-600 italic uppercase">My Shopee Hub</h1>
      <button onclick="toggleAdmin()" class="bg-orange-50 p-2 rounded-xl text-orange-600">⚙️</button>
    </div>
    <input type="text" id="search-input" onkeyup="filterProducts()" placeholder="Cari barang..." class="w-full bg-gray-100 rounded-2xl py-3 px-11 text-sm outline-none focus:ring-2 focus:ring-orange-500 transition-all">
    <div id="active-cat-label" class="mt-2 text-[10px] font-bold text-gray-400 uppercase text-left">Kategori: Semua</div>
  </header>

  <!-- Admin Panel -->
  <div id="admin-panel" class="hidden absolute top-20 inset-x-4 z-[60] p-6 bg-white rounded-3xl shadow-2xl border border-orange-100 ring-8 ring-black ring-opacity-5 text-left text-sm">
    <h2 id="admin-title" class="font-black text-lg mb-4 italic uppercase">Tambah Produk</h2>
    <div class="space-y-3">
      <input id="admin-pass" type="password" placeholder="Password Admin" class="w-full p-3 border rounded-xl bg-gray-50 outline-none">
      <input id="p-name" type="text" placeholder="Nama Produk" class="w-full p-3 border rounded-xl outline-none">
      <div class="grid grid-cols-2 gap-2">
        <input id="p-price" type="number" step="0.01" placeholder="Harga Jual" class="p-3 border rounded-xl outline-none">
        <input id="p-original-price" type="number" step="0.01" placeholder="Harga Asal" class="p-3 border rounded-xl outline-none">
      </div>
      <div class="grid grid-cols-2 gap-2">
        <input id="p-sold" type="number" placeholder="Terjual" class="p-3 border rounded-xl outline-none">
        <input id="p-category" type="text" placeholder="Kategori" class="p-3 border rounded-xl outline-none uppercase font-bold text-orange-600">
      </div>
      <div class="grid grid-cols-2 gap-2">
        <select id="p-rating" class="p-3 border rounded-xl bg-white"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option></select>
        <div class="p-1 border rounded-xl"><input id="p-image-file" type="file" multiple class="text-[9px] w-full mt-1"></div>
      </div>
      <input id="p-review" type="text" placeholder="Review Ringkas" class="w-full p-3 border rounded-xl italic">
      <input id="p-link" type="text" placeholder="Link Affiliate Produk" class="w-full p-3 border rounded-xl">
      <input id="p-shop-link" type="text" placeholder="Link Affiliate Store" class="w-full p-3 border rounded-xl">
      
      <button onclick="saveProduct()" id="btn-save" class="w-full shopee-gradient text-white font-black py-4 rounded-2xl shadow-lg uppercase tracking-widest active:scale-95 transition-all">Publish Barang</button>
      <button onclick="resetAdminForm()" id="btn-cancel" class="hidden w-full bg-gray-200 text-gray-500 font-bold py-2 rounded-xl mt-2">Batal Edit</button>
    </div>
  </div>

  <div class="p-4 grid grid-cols-2 gap-4" id="product-list"></div>
</div>

<script>
const SUPABASE_URL = 'https://wzjucotepgqhcmgidgda.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1zE-aPwB_AHU7hU_yaUI9Q_zWplLCSL';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const ADMIN_PASSWORD = "123";

let allProducts = [];
let currentCategory = 'Semua';
let editingId = null; // Track if we are editing

async function loadProducts() {
  const { data, error } = await _supabase.from('products').select('*').order('id', { ascending: false });
  if (!error) { allProducts = data; generateSidebarCategories(); filterProducts(); }
}

function filterProducts() {
  const term = document.getElementById('search-input').value.toLowerCase();
  const container = document.getElementById('product-list');
  const isAdmin = !document.getElementById('admin-panel').classList.contains('hidden');
  let filtered = allProducts.filter(p => p.name.toLowerCase().includes(term) && (currentCategory === 'Semua' || p.category === currentCategory));
  
  container.innerHTML = '';
  filtered.forEach(p => {
    const disc = p.original_price ? Math.round(((p.original_price - p.price) / p.original_price) * 100) : 0;
    
    // Admin Controls (Edit & Delete)
    const controls = isAdmin ? `
      <div class="absolute top-2 right-2 flex gap-1 z-30">
        <button onclick="prepareEdit(${p.id})" class="bg-blue-600 text-white w-7 h-7 rounded-full text-[10px] font-bold shadow-lg flex items-center justify-center italic">E</button>
        <button onclick="deleteProduct(${p.id})" class="bg-red-600 text-white w-7 h-7 rounded-full text-[10px] font-bold shadow-lg flex items-center justify-center italic">X</button>
      </div>` : '';

    const imgList = (p.images && p.images.length > 0) ? p.images : [p.image_url];
    const slider = `
      <div class="relative w-full h-44 overflow-hidden">
        <div class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar w-full h-full bg-gray-50">
          ${imgList.map(img => `<img src="${img}" class="w-full h-44 object-cover flex-shrink-0 snap-center" onerror="this.src='https://via.placeholder.com/300'">`).join('')}
        </div>
        ${imgList.length > 1 ? `<div class="absolute bottom-2 right-2 bg-black/50 text-white text-[8px] font-bold px-2 py-0.5 rounded-full z-10 backdrop-blur-sm">↔ SWIPE</div>` : ''}
      </div>`;

    container.innerHTML += `
      <div class="relative bg-white rounded-3xl border border-gray-100 shadow-sm flex flex-col overflow-hidden transition-all active:scale-95 italic text-left">
        ${controls}
        ${disc > 0 ? `<div class="absolute top-3 left-3 bg-red-500 text-white text-[9px] font-black px-2 py-1 rounded-lg z-20 animate-pulse">-${disc}%</div>` : ''}
        ${slider}
        <div class="p-4 flex flex-col flex-grow">
          <h2 class="text-[12px] font-bold text-gray-800 line-clamp-2 mb-1 h-8 font-sans not-italic leading-tight">${p.name}</h2>
          <div class="flex items-center gap-1 mb-2 font-sans not-italic text-[9px] font-bold text-gray-400">⭐ ${p.rating}.0 | Terjual ${p.sold_count}</div>
          <div class="mb-3 font-sans not-italic">${p.original_price ? `<p class="text-[10px] text-gray-400 line-through decoration-red-300 italic">RM${p.original_price.toFixed(2)}</p>` : ''}<p class="text-orange-600 font-black text-lg italic leading-tight">RM${p.price.toFixed(2)}</p></div>
          ${p.review_text ? `<div class="bg-orange-50 p-2.5 rounded-2xl mb-4 border border-orange-100 text-[9px] text-orange-800 italic font-medium font-sans leading-tight">" ${p.review_text} "</div>` : ''}
          <div class="space-y-2 mt-auto">
            <a href="${p.affiliate_url}" target="_blank" class="block w-full shopee-gradient text-white text-[10px] font-black py-3 rounded-xl text-center uppercase shadow-md shadow-orange-100 not-italic font-sans">BELI SEKARANG</a>
            ${p.shop_url ? `<a href="${p.shop_url}" target="_blank" class="block w-full bg-gray-100 text-gray-500 text-[10px] font-bold py-2 rounded-xl text-center uppercase not-italic font-sans">Lihat Store</a>` : ''}
          </div>
        </div>
      </div>`;
  });
}

// FUNGSI EDIT: Masukkan data ke form
function prepareEdit(id) {
  const p = allProducts.find(item => item.id === id);
  if (!p) return;

  editingId = id;
  document.getElementById('admin-title').innerText = "Edit Produk";
  document.getElementById('btn-save').innerText = "Update Produk";
  document.getElementById('btn-cancel').classList.remove('hidden');

  document.getElementById('p-name').value = p.name;
  document.getElementById('p-price').value = p.price;
  document.getElementById('p-original-price').value = p.original_price || '';
  document.getElementById('p-sold').value = p.sold_count;
  document.getElementById('p-category').value = p.category;
  document.getElementById('p-rating').value = p.rating;
  document.getElementById('p-review').value = p.review_text;
  document.getElementById('p-link').value = p.affiliate_url;
  document.getElementById('p-shop-link').value = p.shop_url || '';
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetAdminForm() {
  editingId = null;
  document.getElementById('admin-title').innerText = "Tambah Produk";
  document.getElementById('btn-save').innerText = "Publish Barang";
  document.getElementById('btn-cancel').classList.add('hidden');
  document.getElementById('p-name').value = '';
  document.getElementById('p-price').value = '';
  document.getElementById('p-original-price').value = '';
  document.getElementById('p-sold').value = '';
  document.getElementById('p-category').value = '';
  document.getElementById('p-review').value = '';
  document.getElementById('p-link').value = '';
  document.getElementById('p-shop-link').value = '';
}

async function saveProduct() {
  const pass = document.getElementById('admin-pass').value;
  if (pass !== ADMIN_PASSWORD) return alert("Password Salah!");

  const btn = document.getElementById('btn-save');
  const fileInput = document.getElementById('p-image-file');
  
  btn.innerText = "⏳ Sedang Proses...";
  btn.disabled = true;

  try {
    let finalImageUrl = "";
    let finalImagesArray = [];

    // Jika ada upload gambar baru
    if (fileInput.files.length > 0) {
      const files = Array.from(fileInput.files);
      for (const file of files) {
        const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${file.name.split('.').pop()}`;
        await _supabase.storage.from('product-image').upload(fileName, file);
        const { data: urlData } = _supabase.storage.from('product-image').getPublicUrl(fileName);
        finalImagesArray.push(urlData.publicUrl);
      }
      finalImageUrl = finalImagesArray[0];
    } else if (editingId) {
      // Jika edit tapi tak upload gambar baru, guna gambar lama
      const p = allProducts.find(item => item.id === editingId);
      finalImageUrl = p.image_url;
      finalImagesArray = p.images;
    }

    const payload = {
      name: document.getElementById('p-name').value,
      price: parseFloat(document.getElementById('p-price').value),
      original_price: parseFloat(document.getElementById('p-original-price').value) || null,
      sold_count: parseInt(document.getElementById('p-sold').value) || 0,
      category: document.getElementById('p-category').value || 'Lain-lain',
      rating: parseInt(document.getElementById('p-rating').value),
      review_text: document.getElementById('p-review').value,
      image_url: finalImageUrl,
      images: finalImagesArray,
      affiliate_url: document.getElementById('p-link').value,
      shop_url: document.getElementById('p-shop-link').value
    };

    if (editingId) {
      const { error } = await _supabase.from('products').update(payload).eq('id', editingId);
      if (error) throw error;
      alert("✅ Berjaya Di-Update!");
    } else {
      if (!finalImageUrl) throw new Error("Sila pilih gambar!");
      const { error } = await _supabase.from('products').insert([payload]);
      if (error) throw error;
      alert("✅ Berjaya Di-Publish!");
    }
    
    resetAdminForm();
    loadProducts();
  } catch (err) { alert(err.message); }
  finally { btn.innerText = editingId ? "Update Produk" : "Publish Barang"; btn.disabled = false; }
}

async function deleteProduct(id) {
  const pass = document.getElementById('admin-pass').value;
  if (pass !== ADMIN_PASSWORD) return alert("Sila masukkan password admin!");
  if (confirm("Padam barang ni?")) {
    const { error } = await _supabase.from('products').delete().eq('id', id);
    if (!error) loadProducts();
  }
}

function toggleAdmin() { document.getElementById('admin-panel').classList.toggle('hidden'); filterProducts(); }
function toggleSidebar() { 
  const s = document.getElementById('sidebar'); 
  const o = document.getElementById('sidebar-overlay');
  if (s.classList.contains('sidebar-hidden')) { s.classList.replace('sidebar-hidden', 'sidebar-visible'); o.classList.remove('hidden'); }
  else { s.classList.replace('sidebar-visible', 'sidebar-hidden'); o.classList.add('hidden'); }
}
function generateSidebarCategories() {
  const list = document.getElementById('category-list');
  const cats = ['Semua', ...new Set(allProducts.map(p => p.category).filter(c => c))];
  list.innerHTML = '';
  cats.forEach(c => {
    const active = currentCategory === c;
    list.innerHTML += `<button onclick="setCategory('${c}')" class="text-left py-3 px-5 rounded-2xl text-xs font-bold ${active ? 'bg-orange-600 text-white' : 'bg-gray-50 text-gray-500'} uppercase">${c}</button>`;
  });
}
function setCategory(c) { currentCategory = c; document.getElementById('active-cat-label').innerText = "Kategori: " + c; toggleSidebar(); generateSidebarCategories(); filterProducts(); }

loadProducts();
</script>
</body>
</html>
