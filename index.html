<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shopee Hub - Premium Katalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .shopee-gradient { background: linear-gradient(135deg, #f53d2d 0%, #ff6433 100%); }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-hidden { transform: translateX(-100%); }
        .sidebar-visible { transform: translateX(0); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Style untuk slider gambar */
        .snap-x { scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .snap-center { scroll-snap-align: center; }
    </style>
</head>
<body>

<div id="app" class="max-w-lg mx-auto min-h-screen pb-24 shadow-2xl bg-white relative overflow-hidden">
  
  <!-- Sidebar Menu (Drawer) -->
  <div id="sidebar-overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[100]"></div>
  <div id="sidebar" class="sidebar-hidden fixed top-0 left-0 bottom-0 w-64 bg-white z-[101] shadow-2xl p-6">
    <div class="flex justify-between items-center mb-8 text-left">
      <h2 class="font-black text-xl text-orange-600 italic uppercase">Kategori</h2>
      <button onclick="toggleSidebar()" class="text-gray-400 text-3xl">&times;</button>
    </div>
    <div id="category-list" class="flex flex-col gap-3"></div>
  </div>

  <!-- Header -->
  <header class="bg-white sticky top-0 z-50 px-5 py-4 border-b border-gray-100 shadow-sm">
    <div class="flex justify-between items-center mb-4 text-center">
      <button onclick="toggleSidebar()" class="text-gray-700 p-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <div>
        <h1 class="text-xl font-black text-orange-600 italic tracking-tighter uppercase leading-none text-center">My Shopee Hub</h1>
        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-1 text-center">Premium Affiliate Hub</p>
      </div>
      <button onclick="toggleAdmin()" class="bg-orange-50 p-2 rounded-xl text-orange-600">⚙️</button>
    </div>
    <div class="relative">
      <input type="text" id="search-input" onkeyup="filterProducts()" placeholder="Cari barang racun..." class="w-full bg-gray-100 border-none rounded-2xl py-3 px-11 text-sm outline-none focus:ring-2 focus:ring-orange-500">
      <span class="absolute left-4 top-3.5 opacity-30">🔍</span>
    </div>
    <div id="active-cat-label" class="mt-2 text-[10px] font-bold text-gray-400 uppercase tracking-widest text-left px-1">Kategori: Semua</div>
  </header>

  <!-- Admin Panel -->
  <div id="admin-panel" class="hidden absolute top-20 inset-x-4 z-[60] p-6 bg-white rounded-3xl shadow-2xl border border-orange-100 ring-8 ring-black ring-opacity-5 text-left">
    <h2 class="font-black text-lg mb-4 italic uppercase text-gray-800">Tambah Produk</h2>
    <div class="space-y-3">
      <input id="admin-pass" type="password" placeholder="Password Admin" class="w-full p-3 border rounded-xl text-sm bg-gray-50 outline-none">
      <input id="p-name" type="text" placeholder="Nama Produk" class="w-full p-3 border rounded-xl text-sm outline-none">
      
      <div class="grid grid-cols-2 gap-2">
        <input id="p-price" type="number" step="0.01" placeholder="Harga Jual" class="p-3 border rounded-xl text-sm outline-none">
        <input id="p-original-price" type="number" step="0.01" placeholder="Harga Asal" class="p-3 border rounded-xl text-sm outline-none">
      </div>

      <div class="grid grid-cols-2 gap-2">
        <input id="p-sold" type="number" placeholder="Terjual" class="p-3 border rounded-xl text-sm outline-none">
        <input id="p-category" type="text" placeholder="Kategori" class="p-3 border rounded-xl text-sm outline-none uppercase font-bold">
      </div>

      <div class="grid grid-cols-2 gap-2">
        <select id="p-rating" class="p-3 border rounded-xl text-sm outline-none bg-white font-sans">
          <option value="5">⭐⭐⭐⭐⭐</option>
          <option value="4">⭐⭐⭐⭐</option>
        </select>
        <div class="p-1 border rounded-xl">
           <label class="text-[8px] font-bold text-gray-400 uppercase ml-1 block">Pilih Gambar (Multiple)</label>
           <input id="p-image-file" type="file" accept="image/*" multiple class="text-[9px] w-full mt-1">
        </div>
      </div>

      <input id="p-review" type="text" placeholder="Review Ringkas (Paling Racun)" class="w-full p-3 border rounded-xl text-sm italic">
      <input id="p-link" type="text" placeholder="Link Affiliate Shopee" class="w-full p-3 border rounded-xl text-sm outline-none border-orange-200">
      
      <button onclick="saveProduct()" id="btn-save" class="w-full shopee-gradient text-white font-black py-4 rounded-2xl shadow-lg uppercase tracking-widest active:scale-95 transition-all mt-2">Publish Sekarang</button>
    </div>
  </div>

  <!-- Product List -->
  <div class="p-4 grid grid-cols-2 gap-4" id="product-list">
    <p class="col-span-2 text-center text-gray-400 py-20 text-xs">Memuatkan barang...</p>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wzjucotepgqhcmgidgda.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1zE-aPwB_AHU7hU_yaUI9Q_zWplLCSL';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const ADMIN_PASSWORD = "123";

let allProducts = [];
let currentCategory = 'Semua';

async function loadProducts() {
  const { data, error } = await _supabase.from('products').select('*').order('id', { ascending: false });
  if (error) {
    console.error(error);
    return;
  }
  allProducts = data;
  generateSidebarCategories();
  filterProducts();
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  if (sidebar.classList.contains('sidebar-hidden')) {
    sidebar.classList.replace('sidebar-hidden', 'sidebar-visible');
    overlay.classList.remove('hidden');
  } else {
    sidebar.classList.replace('sidebar-visible', 'sidebar-hidden');
    overlay.classList.add('hidden');
  }
}

function generateSidebarCategories() {
  const list = document.getElementById('category-list');
  const categories = ['Semua', ...new Set(allProducts.map(p => p.category).filter(c => c))];
  list.innerHTML = '';
  categories.forEach(cat => {
    const isActive = currentCategory === cat;
    list.innerHTML += `<button onclick="setCategory('${cat}')" class="text-left py-3.5 px-5 rounded-2xl text-xs font-bold transition-all uppercase tracking-wider ${isActive ? 'bg-orange-600 text-white shadow-lg' : 'bg-gray-50 text-gray-500'}">
      ${cat}
    </button>`;
  });
}

function setCategory(cat) {
  currentCategory = cat;
  document.getElementById('active-cat-label').innerText = "Kategori: " + cat;
  toggleSidebar();
  generateSidebarCategories();
  filterProducts();
}

function filterProducts() {
  const searchTerm = document.getElementById('search-input').value.toLowerCase();
  const container = document.getElementById('product-list');
  const isAdminOpen = !document.getElementById('admin-panel').classList.contains('hidden');

  let filtered = allProducts.filter(p => p.name.toLowerCase().includes(searchTerm) && (currentCategory === 'Semua' || p.category === currentCategory));

  container.innerHTML = '';
  if(filtered.length === 0) {
    container.innerHTML = `<p class="col-span-2 text-center text-gray-400 py-20 text-xs italic">Barang tidak dijumpai...</p>`;
    return;
  }

  filtered.forEach(p => {
    const discount = p.original_price ? Math.round(((p.original_price - p.price) / p.original_price) * 100) : 0;
    const deleteBtn = isAdminOpen ? `<button onclick="deleteProduct(${p.id})" class="absolute top-2 right-2 bg-red-600 text-white w-7 h-7 rounded-full text-[10px] z-30 font-bold shadow-lg flex items-center justify-center italic">X</button>` : '';

    // Slider Logic
    const imgList = p.images && p.images.length > 0 ? p.images : [p.image_url];
    const imageSlider = `
      <div class="relative w-full h-44 overflow-hidden">
        <div class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar w-full h-full bg-gray-50">
          ${imgList.map(img => `<img src="${img}" class="w-full h-44 object-cover flex-shrink-0 snap-center" onerror="this.src='https://via.placeholder.com/300'">`).join('')}
        </div>
        ${imgList.length > 1 ? `<div class="absolute bottom-2 right-2 bg-black/50 text-white text-[8px] font-bold px-2 py-0.5 rounded-full z-10 backdrop-blur-sm">↔ SWIPE</div>` : ''}
      </div>
    `;

    container.innerHTML += `
      <div class="relative bg-white rounded-3xl border border-gray-100 shadow-sm flex flex-col overflow-hidden transition-all active:scale-95 italic">
        ${deleteBtn}
        ${discount > 0 ? `<div class="absolute top-3 left-3 bg-red-500 text-white text-[9px] font-black px-2 py-1 rounded-lg z-20 shadow-sm not-italic font-sans animate-pulse">-${discount}%</div>` : ''}
        
        ${imageSlider}

        <div class="p-4 flex flex-col flex-grow text-left">
          <h2 class="text-[12px] font-bold text-gray-800 line-clamp-2 mb-1 h-8 font-sans not-italic leading-tight">${p.name}</h2>
          <div class="flex items-center gap-1 mb-2 font-sans not-italic text-[9px] font-bold text-gray-400">
            <span class="text-gray-700">⭐ ${p.rating || 5}.0</span>
            <span class="ml-1">| Terjual ${p.sold_count || 0}</span>
          </div>
          <div class="mb-3 font-sans not-italic">
            ${p.original_price ? `<p class="text-[10px] text-gray-400 line-through leading-none decoration-red-300 italic font-medium">RM${p.original_price.toFixed(2)}</p>` : ''}
            <p class="text-orange-600 font-black text-lg italic leading-tight">RM${p.price.toFixed(2)}</p>
          </div>
          ${p.review_text ? `
            <div class="bg-orange-50 p-2.5 rounded-2xl mb-4 border border-orange-100">
              <p class="text-[9px] text-orange-800 leading-relaxed italic font-medium font-sans">" ${p.review_text} "</p>
            </div>
          ` : ''}
          <a href="${p.affiliate_url}" target="_blank" class="block w-full shopee-gradient text-white text-[10px] font-black py-3 rounded-2xl text-center uppercase tracking-tighter not-italic font-sans shadow-md shadow-orange-100 mt-auto">BELI SEKARANG</a>
        </div>
      </div>`;
  });
}

async function saveProduct() {
  const pass = document.getElementById('admin-pass').value;
  const name = document.getElementById('p-name').value;
  const price = document.getElementById('p-price').value;
  const fileInput = document.getElementById('p-image-file');
  const btn = document.getElementById('btn-save');

  if (pass !== ADMIN_PASSWORD) return alert("Password Salah!");
  if (!name || !price || fileInput.files.length === 0) return alert("Info produk atau gambar tidak lengkap!");

  btn.innerText = "⏳ Sedang Memproses...";
  btn.disabled = true;

  try {
    const uploadedUrls = [];
    const files = Array.from(fileInput.files);

    for (let i = 0; i < files.length; i++) {
        btn.innerText = `⏳ Uploading ${i+1}/${files.length}...`;
        const file = files[i];
        const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${file.name.split('.').pop()}`;
        const { error: uploadError } = await _supabase.storage.from('product-image').upload(fileName, file);
        if (uploadError) throw uploadError;
        const { data: urlData } = _supabase.storage.from('product-image').getPublicUrl(fileName);
        uploadedUrls.push(urlData.publicUrl);
    }

    const { error: insertError } = await _supabase.from('products').insert([{ 
      name, 
      price: parseFloat(price), 
      original_price: parseFloat(document.getElementById('p-original-price').value) || null,
      sold_count: parseInt(document.getElementById('p-sold').value) || 0,
      category: document.getElementById('p-category').value || 'Lain-lain',
      rating: parseInt(document.getElementById('p-rating').value),
      review_text: document.getElementById('p-review').value,
      image_url: uploadedUrls[0], // Cover utama
      images: uploadedUrls, // Array semua gambar
      affiliate_url: document.getElementById('p-link').value 
    }]);

    if (insertError) throw insertError;
    alert("✅ Berjaya Di-Publish!");
    location.reload();

  } catch (err) {
    alert("Ralat: " + err.message);
  } finally {
    btn.innerText = "Publish Sekarang";
    btn.disabled = false;
  }
}

async function deleteProduct(id) {
  const pass = document.getElementById('admin-pass').value;
  if (pass !== ADMIN_PASSWORD) return alert("Sila masukkan password admin!");
  if (confirm("Betul ke nak padam?")) {
    await _supabase.from('products').delete().eq('id', id);
    loadProducts();
  }
}

function toggleAdmin() {
  document.getElementById('admin-panel').classList.toggle('hidden');
  filterProducts();
}

// Initial Load
loadProducts();
</script>
</body>
</html>
